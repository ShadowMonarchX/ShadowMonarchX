name: Update Daily Activity

on:
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-profile-readme
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz

      - name: Update README activity
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_USERNAME: ShadowMonarchX
        run: |
          python << 'EOF'
          import os
          import re
          import requests
          from datetime import datetime, timedelta, timezone
          import pytz

          TOKEN = os.getenv("GH_TOKEN")
          USERNAME = os.getenv("GH_USERNAME")

          if not TOKEN:
              raise RuntimeError("GH_TOKEN is missing")

          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28"
          }

          IST = pytz.timezone("Asia/Kolkata")
          now = datetime.now(IST)

          today_start = now.replace(
              hour=0,
              minute=0,
              second=0,
              microsecond=0
          )

          week_start = today_start - timedelta(days=7)
          month_start = today_start - timedelta(days=30)

          def safe_get(url, params=None):
              try:
                  response = requests.get(
                      url,
                      headers=HEADERS,
                      params=params,
                      timeout=30
                  )
                  response.raise_for_status()
                  return response.json()
              except Exception as error:
                  print(f"Request failed: {error}")
                  return {}

          def search_count(query):
              data = safe_get(
                  "https://api.github.com/search/issues",
                  {"q": query, "per_page": 1}
              )
              return data.get("total_count", 0)

          def commit_count(date_str):
              try:
                  data = safe_get(
                      "https://api.github.com/search/commits",
                      {
                          "q": f"author:{USERNAME} committer-date:>={date_str}",
                          "per_page": 1
                      }
                  )
                  return data.get("total_count", 0)
              except Exception:
                  return 0

          today = today_start.strftime("%Y-%m-%d")
          week = week_start.strftime("%Y-%m-%d")
          month = month_start.strftime("%Y-%m-%d")

          commits_today = commit_count(today)
          commits_week = commit_count(week)
          commits_month = commit_count(month)

          pr_today = search_count(
              f"author:{USERNAME} type:pr created:>={today}"
          )
          pr_week = search_count(
              f"author:{USERNAME} type:pr created:>={week}"
          )
          pr_month = search_count(
              f"author:{USERNAME} type:pr created:>={month}"
          )

          merged_today = search_count(
              f"author:{USERNAME} type:pr merged:>={today}"
          )
          merged_week = search_count(
              f"author:{USERNAME} type:pr merged:>={week}"
          )
          merged_month = search_count(
              f"author:{USERNAME} type:pr merged:>={month}"
          )

          issues_today = search_count(
              f"author:{USERNAME} type:issue created:>={today}"
          )
          issues_week = search_count(
              f"author:{USERNAME} type:issue created:>={week}"
          )
          issues_month = search_count(
              f"author:{USERNAME} type:issue created:>={month}"
          )

          comments_today = search_count(
              f"commenter:{USERNAME} type:pr updated:>={today}"
          )
          comments_week = search_count(
              f"commenter:{USERNAME} type:pr updated:>={week}"
          )
          comments_month = search_count(
              f"commenter:{USERNAME} type:pr updated:>={month}"
          )

          recent_events = []

          events = safe_get(
              f"https://api.github.com/users/{USERNAME}/events/public",
              {"per_page": 5}
          )

          if isinstance(events, list):
              for index, event in enumerate(events, start=1):
                  event_type = event.get("type", "Activity")
                  repo = event.get("repo", {}).get("name", "")
                  created = event.get("created_at", "")[:10]

                  recent_events.append(
                      f"{index}. {event_type} in `{repo}` — _{created}_"
                  )

          if not recent_events:
              recent_events.append(
                  "1. No recent public activity available."
              )

          updated_at = now.strftime(
              "%d %b %Y, %I:%M %p IST"
          )

          activity_block = f"""| Metric | Today | This Week | This Month |
          |:---|:---:|:---:|:---:|
          | Commits | {commits_today} | {commits_week} | {commits_month} |
          | Pull Requests Opened | {pr_today} | {pr_week} | {pr_month} |
          | PRs Merged | {merged_today} | {merged_week} | {merged_month} |
          | PR Comments | {comments_today} | {comments_week} | {comments_month} |
          | Issues Opened | {issues_today} | {issues_week} | {issues_month} |

          Last Updated: {updated_at}
          """

          recent_block = (
              "\n".join(recent_events)
              + f"\n\nLast Updated: {updated_at}"
          )

          with open("README.md", "r", encoding="utf-8") as file:
              readme = file.read()

          readme = re.sub(
              r"<!-- ACTIVITY-START -->.*?<!-- ACTIVITY-END -->",
              f"<!-- ACTIVITY-START -->\n{activity_block}\n<!-- ACTIVITY-END -->",
              readme,
              flags=re.DOTALL
          )

          readme = re.sub(
              r"<!-- RECENT-ACTIVITY-START -->.*?<!-- RECENT-ACTIVITY-END -->",
              f"<!-- RECENT-ACTIVITY-START -->\n{recent_block}\n<!-- RECENT-ACTIVITY-END -->",
              readme,
              flags=re.DOTALL
          )

          with open("README.md", "w", encoding="utf-8") as file:
              file.write(readme)

          print("README updated successfully")
          EOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md

          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi

          git commit -m "chore: update profile activity [skip ci]"
          git push

      - name: Workflow summary
        run: |
          echo "README activity update completed"
